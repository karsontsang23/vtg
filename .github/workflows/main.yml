name: GIF Convert V4
on:
  workflow_dispatch:
    inputs:
      video_url:
        required: true
      job_id:
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Video from Worker KV
        run: |
          curl -L "https://vtg.karsontsang23.workers.dev/get-video?id=${{ inputs.job_id }}" -o input.mp4

      - name: Convert to GIF
        run: |
          ffmpeg -i input.mp4 -vf "fps=15,scale=480:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse" output.gif

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.job_id }}
          path: output.gif

      - name: Notify Cloudflare Worker (Webhook)
        run: |
          curl -X POST https://vtg.karsontsang23.workers.dev/callback \
            -H "Content-Type: application/json" \
            -d '{
              "job_id": "${{ inputs.job_id }}",
              "gif_url": "https://nightly.link/${{ github.repository }}/actions/artifacts/${{ github.run_id }}.zip"
            }'
