name: Video to GIF Converter

on:
  repository_dispatch:
    types: [main]

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      # 1. 從 Worker 下載暫存的影片
      - name: Download Video from Worker
        run: |
          curl -s -o input.mp4 "https://vtg.karsontsang23.workers.dev/get-video?id=${{ github.event.client_payload.job_id }}"

      # 2. 執行 ffmpeg 轉檔（純系統命令，不佔用 Node.js）
      - name: Convert MP4 to GIF
        run: |
          ffmpeg -i input.mp4 -vf "fps=12,scale=480:-1:flags=lanczos" -c:v gif output.gif

      # 3. 將轉好的 GIF 直接 POST 傳回 Worker 儲存
      - name: Send GIF back to Worker
        run: |
          curl -X POST --data-binary @output.gif "https://vtg.karsontsang23.workers.dev/callback?id=${{ github.event.client_payload.job_id }}"
